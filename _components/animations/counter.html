<!-- [START] HTML Counter -->
<div>
	<section class="section section-1">section 1</section>
	<section class="section section-2">section 2</section>
	<section class="section section-3">section 3</section>
	<section class="section section-4">
		<span>section 4</span>
		<div id="num-1"></div>
	</section>
	<section class="section section-5">section 5</section>
</div>
<!-- [END] HTML Counter -->

<!-- [START] JavaScript Counter -->
<script>
	/**
	 * Анимированный счётчик на requestAnimationFrame с easing.
	 * @param {string} selector  — CSS-селектор элемента вывода
	 * @param {number} target    — конечное значение
	 * @param {number} duration  — длительность анимации (мс)
	 * @param {Function} [easeFn] — функция плавности (по умолчанию easeOutQuad)
	 */
	function numCounter(selector, target, duration, easeFn) {
		const el = document.querySelector(selector)
		if (!el) return

		// Защита от повторного запуска
		if (el._counterRunning) return
		el._counterRunning = true

		const ease = easeFn ?? ((t) => t * (2 - t)) // easeOutQuad
		const startTime = performance.now()

		function tick(now) {
			const elapsed = now - startTime
			const progress = Math.min(elapsed / duration, 1) // 0 → 1
			const value = Math.round(ease(progress) * target)

			el.textContent = value

			if (progress < 1) {
				requestAnimationFrame(tick)
			} else {
				el.textContent = target // гарантируем точное финальное значение
				el._counterRunning = false
			}
		}

		requestAnimationFrame(tick)
	}

	// Запуск при скролле — только один раз на элемент
	const observer = new IntersectionObserver(
		(entries, obs) => {
			entries.forEach((entry) => {
				if (!entry.isIntersecting) return

				if (entry.target.classList.contains("section-4")) {
					numCounter("#num-1", 600, 2000)
					obs.unobserve(entry.target) // ← больше не следим за секцией
				}
			})
		},
		{ threshold: 0.3 }, // секция должна быть видна хотя бы на 30%
	)

	document.querySelectorAll(".section").forEach((section) => {
		observer.observe(section)
	})
</script>
<!-- [END] JavaScript Counter -->
